<!DOCTYPE html>
<html>
<head>
    <title>Simple Button</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script>
async function loadTrendModel() {
    // Load the converted TF.js model
    window.trendModel = await tf.loadLayersModel('trend_model_js/model.json');
    console.log('Model loaded');
}

async function predictDigitWithDetails(canvas) {
    if (!window.trendModel) return;

    const img = tf.browser.fromPixels(canvas)
        .resizeNearestNeighbor([28, 28])
        .mean(2)
        .expandDims(-1)
        .toFloat()
        .div(tf.scalar(255))
        .expandDims(0);

    const predictions = window.trendModel.predict(img);
    const data = await predictions.data();
    predictions.dispose();
    img.dispose();

    let resultText = '';
    data.forEach((val, idx) => {
        resultText += `Digit ${idx}: ${(val * 100).toFixed(2)}%<br>`;
    });

    const output = document.getElementById('predictionDetail');
    if (output) {
        output.innerHTML = resultText;
    }
}

window.addEventListener('DOMContentLoaded', loadTrendModel);
</script>
<body>
    <button>Click Me</button>
</body>
</html>
<canvas id="digitCanvas" width="200" height="200" style="border:1px solid #000;"></canvas>
<button id="resetCanvas">Reset</button>
<script>
    let canvas = document.getElementById('digitCanvas');
    let ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.addEventListener('mousedown', () => { drawing = true; });
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
        if(!drawing) return;
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    }

    document.getElementById('resetCanvas').addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

</script>
